<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Material Editor Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .log { background: #f5f5f5; padding: 10px; margin: 10px 0; border-radius: 5px; }
        .error { background: #ffebee; color: #c62828; }
        .success { background: #e8f5e9; color: #2e7d32; }
        .warning { background: #fff3e0; color: #ef6c00; }
        button { padding: 10px 20px; margin: 10px; }
    </style>
</head>
<body>
    <h1>Simple Material Editor Test</h1>
    <div id="logs"></div>
    <button onclick="testMaterialEditor()">Test Material Editor</button>
    <button onclick="testEditFunction()">Test Edit Function</button>

    <!-- Load scripts in order -->
    <script src="assets/js/change-tracker.js"></script>
    <script src="assets/js/validation-engine.js"></script>
    <script src="assets/js/github-integration.js"></script>
    <script src="assets/js/ui-manager.js"></script>
    <script src="assets/js/material-editor.js"></script>

    <script>
        let materialEditor = null;

        function log(message, type = 'info') {
            const logsDiv = document.getElementById('logs');
            const div = document.createElement('div');
            div.className = `log ${type}`;
            div.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logsDiv.appendChild(div);
            console.log(message);
        }

        function testMaterialEditor() {
            log('Starting Material Editor test...');

            // Check if all classes are available
            const classes = ['ChangeTracker', 'ValidationEngine', 'GitHubIntegration', 'UIManager', 'MaterialEditor'];
            let allAvailable = true;

            for (const className of classes) {
                if (typeof window[className] === 'undefined') {
                    log(`${className} is not available!`, 'error');
                    allAvailable = false;
                } else {
                    log(`${className} is available`, 'success');
                }
            }

            if (!allAvailable) {
                log('Cannot proceed - some classes are missing', 'error');
                return;
            }

            // Try to create MaterialEditor instance
            try {
                materialEditor = new MaterialEditor();
                log('MaterialEditor instance created successfully!', 'success');
                log(`MaterialEditor has validationEngine: ${!!materialEditor.validationEngine}`, 'info');
                log(`MaterialEditor has changeTracker: ${!!materialEditor.changeTracker}`, 'info');
                log(`MaterialEditor has githubIntegration: ${!!materialEditor.githubIntegration}`, 'info');
                log(`MaterialEditor has uiManager: ${!!materialEditor.uiManager}`, 'info');
            } catch (error) {
                log(`Failed to create MaterialEditor: ${error.message}`, 'error');
                log(`Error stack: ${error.stack}`, 'error');
            }
        }

        function testEditFunction() {
            if (!materialEditor) {
                log('MaterialEditor not initialized. Run test first.', 'warning');
                return;
            }

            // Create a mock material for testing
            const mockMaterial = {
                id: 'TEST_001',
                mat: 'MAT_024',
                eos: 'EOS_LINEAR_POLYNOMIAL',
                app: ['Testing'],
                ref: 'Test Reference',
                url: 'https://example.com',
                add: '2024-01-01'
            };

            try {
                log('Testing edit function with mock material...', 'info');
                
                // Test if uiManager has the required method
                if (typeof materialEditor.uiManager.startMaterialEdit === 'function') {
                    log('startMaterialEdit method is available', 'success');
                    
                    // Try to call the method (this might fail due to UI dependencies)
                    try {
                        materialEditor.uiManager.startMaterialEdit(mockMaterial, {
                            filename: 'test.yaml',
                            index: 0,
                            rowIndex: 0
                        });
                        log('startMaterialEdit called successfully', 'success');
                    } catch (uiError) {
                        log(`startMaterialEdit failed (expected due to UI): ${uiError.message}`, 'warning');
                    }
                } else {
                    log('startMaterialEdit method is not available', 'error');
                }
            } catch (error) {
                log(`Edit function test failed: ${error.message}`, 'error');
            }
        }

        // Auto-run test on page load
        window.addEventListener('load', () => {
            log('Page loaded, running automatic test...');
            setTimeout(testMaterialEditor, 100);
        });

        // Catch script errors
        window.addEventListener('error', (e) => {
            log(`Script error: ${e.message} in ${e.filename}:${e.lineno}`, 'error');
        });
    </script>
</body>
</html>
