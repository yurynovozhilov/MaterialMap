<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub OAuth Callback - Material MAP</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .callback-container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 2rem;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            max-width: 400px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .status {
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1rem;
        }
        .error {
            color: #ff6b6b;
            background: rgba(255, 107, 107, 0.1);
        }
        .success {
            color: #51cf66;
            background: rgba(81, 207, 102, 0.1);
        }
        button {
            margin-top: 1rem;
            padding: 0.5rem 1rem;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover {
            background: #5a67d8;
        }
        .error button {
            background: #ff6b6b;
        }
        .error button:hover {
            background: #ff5252;
        }
    </style>
</head>
<body>
    <div class="callback-container">
        <div id="loading">
            <div class="spinner"></div>
            <h2>Processing Authentication...</h2>
            <p>Please wait while we complete your GitHub login.</p>
        </div>
        
        <div id="success" style="display: none;">
            <div class="status success">
                <h2>✅ Success!</h2>
                <p>Authentication completed successfully.</p>
                <p>This window will close automatically.</p>
            </div>
        </div>
        
        <div id="error" style="display: none;">
            <div class="status error">
                <h2>❌ Authentication Failed</h2>
                <p id="error-message">An error occurred during authentication.</p>
                <button onclick="window.close()">Close Window</button>
            </div>
        </div>
    </div>

    <script>
        /**
         * Modern OAuth Callback Handler
         * Simplified version that just passes data to parent window
         */
        class ModernOAuthCallback {
            constructor() {
                this.init();
            }

            init() {
                try {
                    const urlParams = new URLSearchParams(window.location.search);
                    const code = urlParams.get('code');
                    const error = urlParams.get('error');
                    const state = urlParams.get('state');
                    const errorDescription = urlParams.get('error_description');

                    console.log('OAuth callback received:', {
                        hasCode: !!code,
                        hasError: !!error,
                        hasState: !!state,
                        error: error,
                        url: window.location.href
                    });

                    if (error) {
                        this.handleError(error, errorDescription);
                        return;
                    }

                    if (!code) {
                        this.handleError('missing_code', 'Authorization code not received from GitHub');
                        return;
                    }

                    if (!state) {
                        this.handleError('missing_state', 'State parameter missing - security check failed');
                        return;
                    }

                    // Send data to parent window
                    this.sendToParent({
                        type: 'github_oauth_callback',
                        success: true,
                        code: code,
                        state: state
                    });

                    this.showSuccess();

                } catch (error) {
                    console.error('Callback initialization error:', error);
                    this.handleError('init_error', error.message);
                }
            }

            sendToParent(data) {
                if (window.opener && !window.opener.closed) {
                    try {
                        window.opener.postMessage(data, window.location.origin);
                        console.log('Data sent to parent window:', data.type);
                    } catch (error) {
                        console.error('Failed to send message to parent:', error);
                        throw new Error('Failed to communicate with parent window');
                    }
                } else {
                    console.error('Parent window not available');
                    throw new Error('Parent window not available - please try again');
                }
            }

            handleError(error, description) {
                console.error('OAuth Error:', error, description);
                
                // Hide loading, show error
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                
                const errorMessage = document.getElementById('error-message');
                errorMessage.textContent = description || `Authentication failed: ${error}`;

                // Send error to parent if possible
                try {
                    this.sendToParent({
                        type: 'github_oauth_callback',
                        success: false,
                        error: error,
                        description: description
                    });
                } catch (e) {
                    console.error('Failed to send error to parent:', e);
                }
            }

            showSuccess() {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('success').style.display = 'block';
                
                // Auto-close after delay
                setTimeout(() => {
                    try {
                        window.close();
                    } catch (e) {
                        console.log('Could not auto-close window');
                    }
                }, 2000);
            }
        }

        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', () => {
            new ModernOAuthCallback();
        });

        // Fallback: initialize immediately if DOM is already loaded
        if (document.readyState === 'loading') {
            // DOM is still loading, wait for DOMContentLoaded
        } else {
            // DOM is already loaded
            new ModernOAuthCallback();
        }
    </script>
</body>
</html>
