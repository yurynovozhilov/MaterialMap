<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Material Editor</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .warning { background-color: #fff3cd; color: #856404; border: 1px solid #ffeaa7; }
        pre { background-color: #f8f9fa; padding: 10px; border-radius: 5px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Material Editor Debug Page</h1>
    <div id="status"></div>
    <div id="details"></div>

    <!-- Load scripts in the same order as index.html -->
    <script src="../src/assets/js/change-tracker.js"></script>
    <script src="../src/assets/js/validation-engine.js"></script>
    <script src="../src/assets/js/github-integration.js"></script>
    <script src="../src/assets/js/ui-manager.js"></script>
    <script src="../src/assets/js/material-editor.js"></script>

    <script>
        function addStatus(message, type = 'info') {
            const statusDiv = document.getElementById('status');
            const div = document.createElement('div');
            div.className = `status ${type}`;
            div.textContent = message;
            statusDiv.appendChild(div);
        }

        function addDetails(title, content) {
            const detailsDiv = document.getElementById('details');
            const h3 = document.createElement('h3');
            h3.textContent = title;
            detailsDiv.appendChild(h3);
            
            const pre = document.createElement('pre');
            pre.textContent = content;
            detailsDiv.appendChild(pre);
        }

        // Check if all classes are loaded
        window.addEventListener('load', function() {
            addStatus('Page loaded, checking components...', 'info');

            const components = {
                'ChangeTracker': typeof ChangeTracker,
                'ValidationEngine': typeof ValidationEngine,
                'GitHubIntegration': typeof GitHubIntegration,
                'UIManager': typeof UIManager,
                'MaterialEditor': typeof MaterialEditor
            };

            let allLoaded = true;
            let details = '';

            for (const [name, type] of Object.entries(components)) {
                const status = type !== 'undefined' ? 'OK' : 'MISSING';
                details += `${name}: ${type} (${status})\n`;
                
                if (type === 'undefined') {
                    allLoaded = false;
                    addStatus(`${name} is not loaded!`, 'error');
                } else {
                    addStatus(`${name} loaded successfully`, 'success');
                }
            }

            addDetails('Component Status', details);

            if (allLoaded) {
                addStatus('All components loaded successfully!', 'success');
                
                // Try to initialize MaterialEditor
                try {
                    const editor = new MaterialEditor();
                    addStatus('MaterialEditor instance created successfully!', 'success');
                    addDetails('MaterialEditor Properties', JSON.stringify({
                        hasValidationEngine: !!editor.validationEngine,
                        hasChangeTracker: !!editor.changeTracker,
                        hasGithubIntegration: !!editor.githubIntegration,
                        hasUiManager: !!editor.uiManager
                    }, null, 2));
                } catch (error) {
                    addStatus(`Failed to create MaterialEditor: ${error.message}`, 'error');
                    addDetails('Error Details', error.stack);
                }
            } else {
                addStatus('Some components are missing - MaterialEditor cannot be initialized', 'error');
            }
        });

        // Check for script loading errors
        window.addEventListener('error', function(e) {
            if (e.filename) {
                addStatus(`Script loading error: ${e.filename} - ${e.message}`, 'error');
            }
        });
    </script>
</body>
</html>
