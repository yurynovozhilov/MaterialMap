<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Modern OAuth - Material MAP</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            background: #f8fafc;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        h1 {
            color: #1e293b;
            margin-bottom: 1rem;
        }
        .status {
            padding: 1rem;
            border-radius: 8px;
            margin: 1rem 0;
        }
        .status.info {
            background: #dbeafe;
            color: #1e40af;
            border: 1px solid #93c5fd;
        }
        .status.success {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #86efac;
        }
        .status.error {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fca5a5;
        }
        button {
            background: #4f46e5;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin: 0.5rem 0.5rem 0.5rem 0;
        }
        button:hover {
            background: #4338ca;
        }
        button:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }
        .user-info {
            background: #f1f5f9;
            padding: 1rem;
            border-radius: 8px;
            margin: 1rem 0;
        }
        .user-info img {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            vertical-align: middle;
            margin-right: 1rem;
        }
        pre {
            background: #1e293b;
            color: #e2e8f0;
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 14px;
        }
        .log {
            max-height: 300px;
            overflow-y: auto;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 1rem;
            border-radius: 8px;
            font-family: 'Fira Code', monospace;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 Modern OAuth Test</h1>
        
        <div id="status" class="status info">
            <strong>Status:</strong> Initializing OAuth client...
        </div>

        <div id="controls">
            <button id="loginBtn" onclick="testLogin()">🔐 Test Login</button>
            <button id="logoutBtn" onclick="testLogout()" disabled>🚪 Logout</button>
            <button id="checkAuthBtn" onclick="checkAuth()">✅ Check Auth Status</button>
            <button id="clearLogBtn" onclick="clearLog()">🧹 Clear Log</button>
        </div>

        <div id="userInfo" style="display: none;" class="user-info">
            <h3>👤 User Information</h3>
            <div id="userDetails"></div>
        </div>

        <div>
            <h3>📋 Debug Log</h3>
            <div id="log" class="log"></div>
        </div>
    </div>

    <!-- Load dependencies -->
    <script src="src/assets/js/config.js"></script>
    <script src="src/assets/js/oauth-client.js"></script>

    <script>
        let oauthClient = null;
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            log('🚀 Initializing OAuth test page...');
            
            // Wait for config to load
            setTimeout(() => {
                if (window.ModernGitHubOAuth) {
                    oauthClient = new ModernGitHubOAuth();
                    log('✅ Modern OAuth client created');
                    updateStatus('OAuth client initialized', 'info');
                    checkAuth();
                } else {
                    log('❌ ModernGitHubOAuth not available');
                    updateStatus('Failed to initialize OAuth client', 'error');
                }
            }, 100);
        });

        function log(message) {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            logDiv.innerHTML += `[${timestamp}] ${message}\n`;
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(message);
        }

        function updateStatus(message, type = 'info') {
            const statusDiv = document.getElementById('status');
            statusDiv.className = `status ${type}`;
            statusDiv.innerHTML = `<strong>Status:</strong> ${message}`;
        }

        async function testLogin() {
            if (!oauthClient) {
                log('❌ OAuth client not initialized');
                return;
            }

            try {
                log('🔐 Starting OAuth authentication...');
                updateStatus('Authenticating with GitHub...', 'info');
                
                const loginBtn = document.getElementById('loginBtn');
                loginBtn.disabled = true;
                loginBtn.textContent = '🔄 Authenticating...';

                const result = await oauthClient.authenticate();
                
                log('✅ Authentication successful!');
                log(`👤 User: ${result.user.login} (${result.user.name})`);
                log(`🔑 Token: ${result.token.substring(0, 20)}...`);
                
                updateStatus('Authentication successful!', 'success');
                showUserInfo(result.user);
                
                loginBtn.disabled = false;
                loginBtn.textContent = '🔐 Test Login';
                document.getElementById('logoutBtn').disabled = false;

            } catch (error) {
                log(`❌ Authentication failed: ${error.message}`);
                updateStatus(`Authentication failed: ${error.message}`, 'error');
                
                const loginBtn = document.getElementById('loginBtn');
                loginBtn.disabled = false;
                loginBtn.textContent = '🔐 Test Login';
            }
        }

        function testLogout() {
            if (!oauthClient) {
                log('❌ OAuth client not initialized');
                return;
            }

            try {
                oauthClient.logout();
                log('🚪 Logged out successfully');
                updateStatus('Logged out', 'info');
                hideUserInfo();
                document.getElementById('logoutBtn').disabled = true;
            } catch (error) {
                log(`❌ Logout failed: ${error.message}`);
            }
        }

        function checkAuth() {
            if (!oauthClient) {
                log('❌ OAuth client not initialized');
                return;
            }

            const isAuth = oauthClient.isAuthenticated();
            const user = oauthClient.getCurrentUser();
            const token = oauthClient.getCurrentToken();

            log(`🔍 Auth check: ${isAuth ? 'Authenticated' : 'Not authenticated'}`);
            
            if (isAuth && user) {
                log(`👤 Current user: ${user.login} (${user.name})`);
                log(`🔑 Token available: ${token ? 'Yes' : 'No'}`);
                showUserInfo(user);
                document.getElementById('logoutBtn').disabled = false;
                updateStatus('User is authenticated', 'success');
            } else {
                log('👤 No authenticated user');
                hideUserInfo();
                document.getElementById('logoutBtn').disabled = true;
                updateStatus('User is not authenticated', 'info');
            }
        }

        function showUserInfo(user) {
            const userInfoDiv = document.getElementById('userInfo');
            const userDetailsDiv = document.getElementById('userDetails');
            
            userDetailsDiv.innerHTML = `
                <div>
                    ${user.avatar_url ? `<img src="${user.avatar_url}" alt="${user.login}">` : ''}
                    <strong>${user.name || user.login}</strong> (@${user.login})
                </div>
                <div style="margin-top: 0.5rem;">
                    <small>Email: ${user.email || 'Not provided'}</small>
                </div>
            `;
            
            userInfoDiv.style.display = 'block';
        }

        function hideUserInfo() {
            document.getElementById('userInfo').style.display = 'none';
        }

        function clearLog() {
            document.getElementById('log').innerHTML = '';
            log('🧹 Log cleared');
        }

        // Global error handler
        window.addEventListener('error', (event) => {
            log(`💥 Global error: ${event.error?.message || event.message}`);
        });

        // Handle unhandled promise rejections
        window.addEventListener('unhandledrejection', (event) => {
            log(`💥 Unhandled promise rejection: ${event.reason?.message || event.reason}`);
        });
    </script>
</body>
</html>
