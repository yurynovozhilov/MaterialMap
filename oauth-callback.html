<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub OAuth Callback - Material MAP</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .callback-container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 2rem;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error {
            color: #ff6b6b;
            background: rgba(255, 107, 107, 0.1);
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1rem;
        }
        .success {
            color: #51cf66;
            background: rgba(81, 207, 102, 0.1);
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="callback-container">
        <div id="loading" style="display: block;">
            <div class="spinner"></div>
            <h2>Processing GitHub Authentication...</h2>
            <p>Please wait while we complete your login.</p>
        </div>
        
        <div id="success" style="display: none;">
            <div class="success">
                <h2>✅ Authentication Successful!</h2>
                <p>You will be redirected back to Material MAP shortly.</p>
            </div>
        </div>
        
        <div id="error" style="display: none;">
            <div class="error">
                <h2>❌ Authentication Failed</h2>
                <p id="error-message">An error occurred during authentication.</p>
                <button onclick="window.close()" style="margin-top: 1rem; padding: 0.5rem 1rem; background: #ff6b6b; color: white; border: none; border-radius: 4px; cursor: pointer;">Close</button>
            </div>
        </div>
    </div>

    <script>
        // GitHub OAuth Callback Handler
        class GitHubOAuthCallback {
            constructor() {
                this.init();
            }

            init() {
                const urlParams = new URLSearchParams(window.location.search);
                const code = urlParams.get('code');
                const error = urlParams.get('error');
                const state = urlParams.get('state');

                console.log('OAuth callback received:', {
                    code: code ? 'present' : 'missing',
                    error: error,
                    state: state ? 'present' : 'missing'
                });

                if (error) {
                    this.handleError(error, urlParams.get('error_description'));
                    return;
                }

                if (!code) {
                    this.handleError('missing_code', 'Authorization code not received from GitHub');
                    return;
                }

                // Pass state verification to parent window
                // (popup window doesn't have access to parent's sessionStorage)
                this.exchangeCodeForToken(code, state);
            }

            async exchangeCodeForToken(code, state) {
                try {
                    // Since we're a static site, we need to use GitHub's device flow
                    // or a proxy service. For now, we'll use the implicit flow approach
                    // where the parent window handles the token exchange.
                    
                    // Send the code back to the parent window
                    if (window.opener) {
                        console.log('Sending OAuth data to parent window:', {
                            code: code ? 'present' : 'missing',
                            state: state ? 'present' : 'missing'
                        });
                        
                        window.opener.postMessage({
                            type: 'github_oauth_callback',
                            success: true,
                            code: code,
                            state: state
                        }, window.location.origin);
                        
                        this.showSuccess();
                        
                        // Close the popup after a short delay
                        setTimeout(() => {
                            window.close();
                        }, 2000);
                    } else {
                        // Fallback: store code and state in sessionStorage and redirect
                        sessionStorage.setItem('github_oauth_code', code);
                        sessionStorage.setItem('github_oauth_callback_state', state);
                        this.showSuccess();
                        
                        setTimeout(() => {
                            // Check if we're on GitHub Pages
                            if (window.location.hostname.includes('github.io')) {
                                window.location.href = '/MaterialMap/index.html';
                            } else {
                                window.location.href = '/index.html';
                            }
                        }, 2000);
                    }

                } catch (error) {
                    console.error('Token exchange error:', error);
                    this.handleError('token_exchange_failed', error.message);
                }
            }

            handleError(error, description) {
                console.error('OAuth Error:', error, description);
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                
                const errorMessage = document.getElementById('error-message');
                errorMessage.textContent = description || `Authentication failed: ${error}`;

                // Send error to parent window if available
                if (window.opener) {
                    window.opener.postMessage({
                        type: 'github_oauth_callback',
                        success: false,
                        error: error,
                        description: description
                    }, window.location.origin);
                }
            }

            showSuccess() {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('success').style.display = 'block';
            }
        }

        // Initialize callback handler when page loads
        document.addEventListener('DOMContentLoaded', () => {
            new GitHubOAuthCallback();
        });
    </script>
</body>
</html>
